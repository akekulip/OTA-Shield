# T1.6 — R6 high-version-poisoning verification (Tier-1 falsifier check).
#
# Source: EXPERIMENT_DESIGN.md §1 T1.6; scenarios.py §1.3 entry
#         `bess.attack.r6_high_version_poison_v0xDEADBEEF`;
#         03_adversary_design.md §2 (locked recipe).
#
# Single-scenario experiment: each trial emits 1 unauthorized poison
# PUBLISH (forged ver=0xDEADBEEF, src=10.0.99.99 ∉ RAT) followed by
# 5 authorized PUBLISHes (legit version, src=10.0.1.10) after a
# 60s gap. The data plane MUST treat the legitimate follow-ups as
# PASS — any R6 fire on event #2..#6 falsifies the post-fix claim.
#
# Wall-clock estimate (~3 h): 10 trials * (gap + drain) ~= 13-15 min/trial.

schema_version: 1
experiment_id: T1.6
description: |
  R6 high-version poisoning: pre-emit one unauthorized PUBLISH carrying
  poison version 0xDEADBEEF, then emit 5 legitimate PUBLISHes after a
  60s gap. Verify R6 false-rollback rate is 0/10 post-fix.
scenarios:
  - id: bess.attack.r6_high_version_poison_v0xDEADBEEF
    weight: 1.0
trial_count: 10
held_out_fraction: 0.0
master_seed: "0xCAFE"
declared_duration_s: 63      # 60s gap + ~3s emit; trial_runner adds post_wait_s separately
duration_tolerance_pct: 10   # ±6.3s envelope; covers SSH/sudo startup variance
target_pps: 50               # only 6 packets/trial; pps cap is trivial
primary_metric: r6_false_rollback_rate
falsifier: |
  Post-fix run still flags any legitimate v_{n+1} packet (events #2..#6)
  as rollback (R6 fires) — i.e. > 0/10 trials show false-rollback.
pass_criterion: |
  Post-fix: 0/10 trials emit an R6 fire on a legitimate v_{n+1}
  follow-up packet. Pre-fix prediction: ~50% (panel-8 §1.3).
wall_clock_estimate_h: 3
statistical_test: |
  Clopper-Pearson UB on false-rollback miss rate, alpha = 0.05; per
  EXPERIMENT_DESIGN §5 zero-event row.
# Generator parameters consumed by traffic_gen.r6_poison.
generator:
  module: traffic_gen.r6_poison
  scenario_class: R6PoisonScenario
  params:
    unauthorized_src_ip: "10.0.99.99"
    legitimate_src_ip:   "10.0.1.10"
    target_bms_ip:       "10.0.2.10"
    poison_version_hex:  "DEADBEEF"
    legitimate_version:  49
    gap_seconds:         60
preflight:
  required_integrity_items: [1, 2, 3, 6, 8, 9, 10, 11, 12]
  scenarios_requiring_sanity_check:
    - bess.attack.r6_high_version_poison_v0xDEADBEEF
  hardware_assertions:
    - "ports 8 and 11 UP at 25G RS-FEC"
    - "bf_switchd PID alive"
    - "controller PID alive"
    - "RAT signature verified at trial start (item 12)"
    - "r6_version_probe action exists in loaded P4 (bfrt info)"
    - "r6_version_commit action exists in loaded P4 (bfrt info)"
replay_mode: live
post_wait_s: 10
